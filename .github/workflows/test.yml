name: Test

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  # Build/typecheck/test the MCP server packages.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - run: bun install
      - run: bun run typecheck
      - run: bun run test

  # Exercise the Dev Container Features via the devcontainers CLI.
  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test features
        uses: devcontainers/action@v1
        with:
          test-features: "true"
          base-path-to-features: "./src"
